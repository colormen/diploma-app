apiVersion: apps/v1
kind: Deployment
metadata:
  name: diploma-app
  namespace: default
  labels:
    app: diploma-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diploma-app
  template:
    metadata:
      labels:
        app: diploma-app
    spec:
      containers:
      - name: diploma-app
        image: diploma-app:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: diploma-app
  namespace: default
  labels:
    app: diploma-app
spec:
  selector:
    app: diploma-app
  ports:
  - name: http
    port: 80
    targetPort: 8000
